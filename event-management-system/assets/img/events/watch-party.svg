<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">MPL Finals Watch Party</title>
  <desc id="desc">Original esports watch party banner with giant arena screen, cheering light sticks, and blue neon atmosphere.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset=".55" stop-color="#0f3b82"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset=".52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1040" cy="150" r="230" fill="#38bdf8" opacity=".13"/>
  <circle cx="210" cy="615" r="210" fill="#a78bfa" opacity=".14"/>
  <g transform="translate(520 96)" filter="url(#glow)">
    <rect width="590" height="316" rx="34" fill="rgba(15,23,42,.7)" stroke="#7dd3fc" stroke-width="8"/>
    <rect x="28" y="28" width="534" height="260" rx="22" fill="url(#screen)" opacity=".9"/>
    <path d="M84 236 C190 116 304 206 424 86" fill="none" stroke="#031525" stroke-width="16" stroke-linecap="round" opacity=".38"/>
    <path d="M94 114 H342" stroke="#031525" stroke-width="13" stroke-linecap="round" opacity=".35"/>
    <text x="78" y="184" fill="#031525" font-size="64" font-family="Poppins,Arial,sans-serif" font-weight="900" opacity=".76">FINALS</text>
  </g>
  <g transform="translate(74 110)">
    <text x="0" y="76" fill="#e0f2fe" font-size="68" font-family="Poppins,Arial,sans-serif" font-weight="800">MPL FINALS</text>
    <text x="0" y="136" fill="#7dd3fc" font-size="48" font-family="Poppins,Arial,sans-serif" font-weight="800">WATCH PARTY</text>
    <text x="4" y="196" fill="#c4e9ff" font-size="26" font-family="Inter,Arial,sans-serif" font-weight="700">Live analysis • Predictions • Fan meetup</text>
  </g>
  <g transform="translate(80 520)" stroke-linecap="round" filter="url(#glow)">
    <path d="M0 84 L20 0" stroke="#38bdf8" stroke-width="14"/>
    <path d="M72 118 L96 18" stroke="#a78bfa" stroke-width="14"/>
    <path d="M164 90 L184 0" stroke="#7dd3fc" stroke-width="14"/>
    <path d="M244 126 L270 30" stroke="#fbbf24" stroke-width="14"/>
    <path d="M344 92 L362 8" stroke="#38bdf8" stroke-width="14"/>
  </g>
  <path d="M0 640 C212 548 398 660 626 586 C848 514 1042 545 1280 474 V720 H0Z" fill="#020617" opacity=".58"/>
</svg>
