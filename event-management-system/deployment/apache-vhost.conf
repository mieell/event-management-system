<VirtualHost *:80>
    ServerName your-domain.com
    ServerAlias www.your-domain.com

    DocumentRoot /var/www/eventflow/public

    <Directory /var/www/eventflow/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    <Directory /var/www/eventflow>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/eventflow-error.log
    CustomLog ${APACHE_LOG_DIR}/eventflow-access.log combined
</VirtualHost>
